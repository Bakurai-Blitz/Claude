<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;

    --accent2: #ff4757;
    --accent3: #47d4ff;
    --text: #f0f0f0;
    --muted: #666;
    --dim: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: 'VAULT';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    color: var(--border);
    pointer-events: none;
    letter-spacing: -5px;
    line-height: 1;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding-bottom: 8px;
  }

  /* SEARCH */
  .search-bar {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-bar input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    flex: 1;
    letter-spacing: 1px;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    color: var(--accent);
    font-size: 16px;
  }

  .result-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* FILTER TABS */
  .filter-bar {
    padding: 16px 40px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  /* MAIN LAYOUT */
  main {
    padding: 40px;
    max-width: 1600px;
  }

  /* SECTION */
  .section {
    margin-bottom: 56px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-emoji {
    font-size: 18px;
  }

  .section-count {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-left: auto;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* CARD */
  .card {
    background: var(--bg);
    padding: 20px 22px;
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    transition: background 0.15s;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .card:hover {
    background: var(--surface2);
  }

  .card:hover::before {
    transform: scaleY(1);
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-name .arrow {
    font-size: 11px;
    color: var(--dim);
    transition: color 0.15s, transform 0.15s;
  }

  .card:hover .arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  .card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  .card-tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    border: 1px solid var(--dim);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .tag-new { color: var(--accent); border-color: var(--accent); }
  .tag-fire { color: var(--accent2); border-color: var(--accent2); }
  .tag-free { color: var(--accent3); border-color: var(--accent3); }

  /* HIDDEN */
  .card.hidden { display: none; }
  .section.hidden { display: none; }

  /* FOOTER */
  footer {
    padding: 32px 40px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  @media (max-width: 700px) {
    header { padding: 32px 20px 24px; }
    .logo { font-size: 48px; }
    header::after { font-size: 120px; }
    .filter-bar, main { padding: 16px 20px; }
    .search-bar { padding: 16px 20px; }
  }
</style>

      { name: "94FBR Search", url: "https://www.google.com/search?q=94fbr", desc: "Append '94fbr' to any app name to find leaked license keys." },
      { name: "AORUS B860M Support", url: "https://www.aorus.com/motherboards/b860m-k/Support", desc: "Your motherboard driver/support page." },
    ]
  },
  {
    category: "📸 Inspiration & Discovery",
    items: [
      { name: "Shots.so", url: "https://shots.so", desc: "Screenshot mockup frames. Clean, modern device canvases." },
      { name: "Unsplash-style", url: "https://fmhy.net", desc: "See FMHY for curated free image sources." },
      { name: "Musclewiki", url: "https://musclewiki.com", desc: "Click a muscle, get exercises. Simple and actually useful." },
      { name: "Terraink", url: "https://terraink.app", desc: "City maps turned into beautiful art prints." },
      { name: "Coolors", url: "https://coolors.co", desc: "Color palette generator. Spacebar for new palettes." },
    ]
  },
];

// Flatten all items for search
let allCards = [];

function buildUI() {
  const main = document.getElementById('main');
  const filtersDiv = document.getElementById('filters');
  let totalCount = 0;

  // All filter button
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'ALL';
  allBtn.dataset.filter = 'all';
  filtersDiv.appendChild(allBtn);

  data.forEach(section => {
    // Filter button
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = section.category;
    btn.dataset.filter = section.category;
    filtersDiv.appendChild(btn);

    // Section
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.category = section.category;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="section-title">${section.category}</span><span class="section-count">${section.items.length} tools</span>`;
    sec.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'grid';

    section.items.forEach(item => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = item.url.startsWith('http') ? item.url : 'https://' + item.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.dataset.name = item.name.toLowerCase();
      card.dataset.desc = item.desc.toLowerCase();
      card.dataset.category = section.category;

      let tagHtml = '';
      if (item.tag === 'new') tagHtml = '<span class="card-tag tag-new">NEW</span>';
      else if (item.tag === 'fire') tagHtml = '<span class="card-tag tag-fire">🔥 HOT</span>';
      else if (item.tag === 'free') tagHtml = '<span class="card-tag tag-free">FREE</span>';

      card.innerHTML = `
        <div class="card-name">${item.name} <span class="arrow">→</span></div>
        <div class="card-desc">${item.desc}</div>
        ${tagHtml}
      `;

      grid.appendChild(card);
      allCards.push(card);
      totalCount++;
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });

  document.getElementById('total-count').textContent = `${totalCount} tools`;
  updateCount();
}

function updateCount() {
  const visible = allCards.filter(c => !c.classList.contains('hidden')).length;
  document.getElementById('count').textContent = visible + ' tools';
}

function filterByCategory(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === cat);
  });

  document.querySelectorAll('.section').forEach(sec => {
    if (cat === 'all' || sec.dataset.category === cat) {
      sec.classList.remove('hidden');
    } else {
      sec.classList.add('hidden');
    }
  });

  // Re-run search if active
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q) doSearch(q);
  else {
    allCards.forEach(c => {
      const secHidden = c.closest('.section').classList.contains('hidden');
      c.classList.toggle('hidden', secHidden);
    });
    updateCount();
  }
}

function doSearch(q) {
  allCards.forEach(card => {
    const secHidden = card.closest('.section').classList.contains('hidden');
    if (secHidden) { card.classList.add('hidden'); return; }
    const match = card.dataset.name.includes(q) || card.dataset.desc.includes(q);
    card.classList.toggle('hidden', !match);
  });
  updateCount();
}

// Events
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    allCards.forEach(card => {
      const secHidden = card.closest('.section').classList.contains('hidden');
      card.classList.toggle('hidden', secHidden);
    });
    updateCount();
    return;
  }
  doSearch(q);
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filterByCategory(btn.dataset.filter);
});

buildUI();
</script>
</body>
</html>
