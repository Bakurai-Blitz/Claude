<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROID — Android Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: #1e1e35;
  --accent: #7c6cfc;
  --accent-glow: rgba(124,108,252,0.2);
  --accent2: #fc6c9a;
  --accent3: #6cfcca;
  --text: #ededf5;
  --muted: #5a5a7a;
  --dim: #2a2a45;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.35;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  position: relative;
  z-index: 1;
  padding: 48px 40px 36px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  overflow: hidden;
}

.logo-word {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px;
  letter-spacing: 6px;
  line-height: 1;
  color: var(--text);
  text-shadow: 0 0 60px var(--accent-glow);
}

.logo-word span { color: var(--accent); }

.header-ghost {
  position: absolute;
  right: -10px;
  top: -20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 180px;
  color: var(--dim);
  pointer-events: none;
  letter-spacing: -4px;
  line-height: 1;
  opacity: 0.5;
}

.header-meta {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  padding-bottom: 10px;
  text-align: right;
  line-height: 1.8;
}

/* SEARCH */
.search-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.search-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 1px;
}

.search-wrap input::placeholder { color: var(--muted); }

.search-icon { color: var(--accent); font-size: 18px; }

.pill-count {
  background: var(--dim);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* FILTERS */
.filter-bar {
  position: relative;
  z-index: 1;
  padding: 14px 40px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.fbtn {
  padding: 5px 13px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}
.fbtn:hover, .fbtn.on {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

/* MAIN */
main {
  position: relative;
  z-index: 1;
  padding: 40px;
  max-width: 1600px;
}

/* SECTION */
.sec { margin-bottom: 52px; }
.sec.gone { display: none; }

.sec-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.sec-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
}

.sec-n {
  margin-left: auto;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 16px 16px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.2s;
}

.card:hover {
  border-color: var(--accent);
  background: var(--surface2);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(124,108,252,0.15);
}

.card:hover::before { opacity: 1; }
.card:active { transform: scale(0.94); }

.card.gone { display: none; }

.card-icon {
  font-size: 20px;
  line-height: 1;
}

.card-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.card-desc {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.6;
  letter-spacing: 0.2px;
  flex: 1;
}

.card-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  align-self: flex-start;
}

.badge-foss  { background: rgba(108,252,202,0.1); color: var(--accent3); border: 1px solid rgba(108,252,202,0.25); }
.badge-root  { background: rgba(252,108,154,0.1); color: var(--accent2); border: 1px solid rgba(252,108,154,0.25); }
.badge-new   { background: rgba(124,108,252,0.15); color: var(--accent); border: 1px solid rgba(124,108,252,0.3); }
.badge-must  { background: rgba(252,200,108,0.1); color: #fcca6c; border: 1px solid rgba(252,200,108,0.25); }

/* FOOTER */
footer {
  position: relative;
  z-index: 1;
  padding: 28px 40px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

@media (max-width: 600px) {
  header { padding: 28px 20px 24px; }
  .logo-word { font-size: 52px; }
  .header-ghost { font-size: 110px; }
  .search-wrap, .filter-bar, main { padding-left: 16px; padding-right: 16px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-word">DROID<span>.</span></div>
    <div style="margin-top:6px;font-size:11px;color:var(--muted);letter-spacing:3px;">ANDROID TOOLKIT — ALL APPS</div>
  </div>
  <div class="header-meta">
    <div id="hdr-count">— apps</div>
    <div>Updated 2026</div>
  </div>
  <div class="header-ghost">APK</div>
</header>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input type="text" id="srch" placeholder="search apps..." autocomplete="off" spellcheck="false">
  <span class="pill-count" id="cnt"></span>
</div>

<div class="filter-bar" id="filters"></div>

<main id="main"></main>

<footer>
  <span>DROID — ANDROID TOOLKIT</span>
  <span id="ft-count"></span>
</footer>

<script>
const DATA = [

      { name:"RiPlay",       icon:"🎵", url:"https://github.com/fast4x/RiPlay/releases/",              desc:"YouTube Music mod with extra features.", badge:"foss" },
      { name:"ViMusic",      icon:"🎵", url:"https://github.com/vfsfitvnm/ViMusic/releases",            desc:"Stream any song from YouTube Music for free, no account.", badge:"must" },
    ]
  },
  {
    cat: "📺 Video & Streaming",
    items: [
      { name:"LibreTube",    icon:"📺", url:"https://github.com/libre-tube/LibreTube/releases",         desc:"YouTube frontend via Piped. No Google tracking, SponsorBlock built-in.", badge:"foss" },
      { name:"NewPipe",      icon:"📺", url:"https://github.com/TeamNewPipe/NewPipe/releases",           desc:"Lightweight YouTube client. No ads, background play, download.", badge:"must" },

      { name:"VLC",          icon:"📺", url:"https://f-droid.org/packages/org.videolan.vlc/",          desc:"Plays literally anything. The OG open source media player.", badge:"must" },
    ]
  },
  {
    cat: "⬇️ Downloaders",
    items: [
      { name:"YTDLnis",      icon:"⬇️", url:"https://github.com/deniscerri/ytdlnis/releases",            desc:"GUI for yt-dlp. Download from 1000+ sites, format picker.", badge:"must" },
      { name:"Seal",         icon:"⬇️", url:"https://github.com/JunkFood02/Seal/releases",               desc:"Clean yt-dlp GUI. Material You, simple and fast.", badge:"foss" },
      { name:"1DM",          icon:"⬇️", url:"https://play.google.com/store/apps/details?id=idm.internet.download.manager", desc:"Multi-thread download manager. IDM for Android." },
      { name:"Aria2App",     icon:"⬇️", url:"https://github.com/devgianlu/Aria2App/releases",            desc:"Aria2 download manager frontend. Torrents, HTTP, magnets.", badge:"foss" },
    ]
  },
  {
    cat: "🛠️ System & Root",
    items: [
      { name:"Shizuku",      icon:"🛠️", url:"https://github.com/rikkaapps/shizuku/releases/",            desc:"Run apps with elevated ADB permissions. Gateway to power tools.", badge:"must" },
      { name:"ShizuTools",   icon:"🛠️", url:"https://github.com/legendsayantan/ShizuTools/releases/",    desc:"System tweaks powered by Shizuku. Debloat, permissions, more.", badge:"new" },
      { name:"Geto",         icon:"🛠️", url:"https://github.com/JackEblan/Geto/releases",                desc:"Per-app settings automation via Shizuku.", badge:"foss" },
      { name:"Canta",        icon:"🛠️", url:"https://github.com/samolego/Canta/releases",                desc:"Uninstall ANY system app without root, uses Shizuku.", badge:"must" },
      { name:"aShell You",   icon:"🛠️", url:"https://github.com/DP-Hridayan/aShellYou/releases",         desc:"ADB shell GUI on-device via Shizuku. Run commands without PC.", badge:"foss" },
      { name:"Termux",       icon:"🛠️", url:"https://github.com/termux/termux-app/releases",             desc:"Full Linux terminal on Android. Install packages, run scripts.", badge:"must" },
      { name:"SD Maid SE",   icon:"🛠️", url:"https://github.com/d4rken-org/sdmaid-se/releases",          desc:"Deep storage cleaner. Finds junk other cleaners miss.", badge:"foss" },
      { name:"Scrcpy",       icon:"🛠️", url:"https://github.com/Genymobile/scrcpy/releases",             desc:"Mirror & control your Android from PC via USB/WiFi. 60fps.", badge:"must" },
    ]
  },
  {
    cat: "📦 App Management",
    items: [
      { name:"Obtainium",    icon:"📦", url:"https://github.com/ImranR98/Obtainium/releases",            desc:"Auto-update APKs directly from GitHub/F-Droid/anywhere.", badge:"must" },
      { name:"UpdateMe",     icon:"📦", url:"https://github.com/anfreire/updateMe-Mobile/releases",      desc:"Curated modded app updates in one place.", badge:"new" },
      { name:"ReVanced",     icon:"📦", url:"https://github.com/revanced/revanced-manager/releases",     desc:"Patch YouTube, Reddit, Twitter and more. No root needed.", badge:"must" },
      { name:"Morphe",     icon:"📦", url:"https://github.com/morpheapp",     desc:"Patch YouTube, YT music, Reddit", badge:"new" },
   
      { name:"ReVanced Ext", icon:"📦", url:"https://github.com/inotia00/revanced-manager/releases",     desc:"ReVanced with extra patches from inotia00.", badge:"new" },
      { name:"MicroG",       icon:"📦", url:"https://github.com/revanced/gmscore/releases",              desc:"Open-source Google Play Services replacement for ReVanced.", badge:"foss" },
      { name:"Aurora Store",  icon:"📦", url:"https://auroraoss.com/files/",                             desc:"Play Store client. Download APKs anonymously, no Google account.", badge:"must" },
      { name:"F-Droid",      icon:"📦", url:"https://f-droid.org/",                                      desc:"The FOSS app store. Only open source apps, no ads ever.", badge:"foss" },
     
      { name:"Droid-ify",    icon:"📦", url:"https://github.com/Droid-ify/client/releases",              desc:"Better F-Droid client. Material You, faster, cleaner UI.", badge:"new" },
    ]
  },
  {
    cat: "📁 Files & Storage",
    items: [
      { name:"MiXplorer",    icon:"📁", url:"https://mixplorer.com",                                     desc:"The best Android file manager. Dual pane, themes, FTP, cloud.", badge:"must" },
      { name:"ZArchiver",    icon:"📁", url:"https://play.google.com/store/apps/details?id=ru.zdevs.zarchiver", desc:"Extract and create archives. Supports everything." },
      { name:"LocalSend",    icon:"📁", url:"https://github.com/localsend/localsend/releases",           desc:"AirDrop for all platforms. Fast, encrypted, no internet needed.", badge:"must" },

  },
  {
    cat: "🔒 Privacy & Security",
    items: [

      { name:"Malwarebytes", icon:"🔒", url:"https://play.google.com/store/apps/details?id=org.malwarebytes.antimalware", desc:"Malware scanner for sketchy APKs." },
      { name:"VirusTotal",   icon:"🔒", url:"https://www.virustotal.com",                                desc:"Scan files and URLs against 70+ antivirus engines." },
      { name:"Cryptomator",  icon:"🔒", url:"https://github.com/cryptomator/android/releases",           desc:"Encrypt cloud files on-device. Works with Drive, Dropbox.", badge:"foss" },
    ]
  },
  {
    cat: "🌐 Browser & Network",
    items: [
      { name:"Cromite",      icon:"🌐", url:"https://github.com/uazo/cromite/releases",                  desc:"Chromium fork with ad blocking and privacy hardening built-in.", badge:"foss" },
      { name:"Firefox",      icon:"🌐", url:"https://www.mozilla.org/firefox/android/",                  desc:"uBlock Origin support, open source, best for extensions.", badge:"foss" },
      { name:"Tor Browser",  icon:"🌐", url:"https://www.torproject.org/download/#android",              desc:"Anonymous browsing via Tor network. No tracking possible.", badge:"foss" },
      { name:"Automate",     icon:"🌐", url:"https://llamalab.com/automate/",                            desc:"Automation flows. Like Tasker but with flowchart UI." },
    ]
  },
  {
    cat: "✏️ Code & Dev",
    items: [
      { name:"Acode",        icon:"✏️", url:"https://github.com/deadlyjack/Acode/releases",              desc:"Full code editor for Android. Syntax highlight, plugins, terminal.", badge:"must" },
      { name:"Termux",       icon:"✏️", url:"https://github.com/termux/termux-app/releases",             desc:"Linux terminal + package manager on Android.", badge:"foss" },
      { name:"aShell You",   icon:"✏️", url:"https://github.com/DP-Hridayan/aShellYou/releases",         desc:"ADB shell GUI on device. Run commands, manage packages.", badge:"foss" },
    ]
  },
  {
    cat: "🖼️ Image & Media",
    items: [
      { name:"Image Toolbox", icon:"🖼️", url:"https://github.com/T8RIN/ImageToolbox/releases/",         desc:"200+ image tools. Resize, convert, background remove, filters.", badge:"must" },
      { name:"Aves Libre",   icon:"🖼️", url:"https://github.com/deckerst/aves/releases",                desc:"Beautiful gallery app. EXIF viewer, metadata editor.", badge:"foss" },
      { name:"Seal",         icon:"🖼️", url:"https://github.com/JunkFood02/Seal/releases",              desc:"Download media from any site. yt-dlp powered.", badge:"foss" },
    ]
  },
];

let allCards = [];

function build() {
  const main = document.getElementById('main');
  const fbar = document.getElementById('filters');
  let total = 0;

  // All button
  const ab = document.createElement('button');
  ab.className = 'fbtn on'; ab.textContent = 'ALL'; ab.dataset.cat = 'all';
  fbar.appendChild(ab);

  DATA.forEach(section => {
    const fb = document.createElement('button');
    fb.className = 'fbtn'; fb.textContent = section.cat; fb.dataset.cat = section.cat;
    fbar.appendChild(fb);

    const sec = document.createElement('div');
    sec.className = 'sec'; sec.dataset.cat = section.cat;

    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = `<span class="sec-title">${section.cat}</span><span class="sec-n">${section.items.length} apps</span>`;
    sec.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'grid';

    section.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.dataset.name = item.name.toLowerCase();
      a.dataset.desc = (item.desc||'').toLowerCase();
      a.dataset.cat = section.cat;

      const badge = item.badge ? `<span class="card-badge badge-${item.badge}">${item.badge==='foss'?'FOSS':item.badge==='root'?'ROOT':item.badge==='new'?'NEW':'⭐ MUST'}</span>` : '';
      a.innerHTML = `
        <div class="card-icon">${item.icon}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc||''}</div>
        ${badge}
      `;
      grid.appendChild(a);
      allCards.push(a);
      total++;
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });

  document.getElementById('hdr-count').textContent = total + ' apps';
  document.getElementById('ft-count').textContent = total + ' apps total';
  recount();
}

function recount() {
  const v = allCards.filter(c => !c.classList.contains('gone')).length;
  document.getElementById('cnt').textContent = v + ' apps';
}

function filterCat(cat) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', b.dataset.cat === cat));
  document.querySelectorAll('.sec').forEach(s => {
    s.classList.toggle('gone', cat !== 'all' && s.dataset.cat !== cat);
  });
  const q = document.getElementById('srch').value.trim().toLowerCase();
  q ? doSearch(q) : showAll();
}

function showAll() {
  allCards.forEach(c => {
    c.classList.toggle('gone', c.closest('.sec').classList.contains('gone'));
  });
  recount();
}

function doSearch(q) {
  allCards.forEach(c => {
    const secHidden = c.closest('.sec').classList.contains('gone');
    c.classList.toggle('gone', secHidden || !(c.dataset.name.includes(q) || c.dataset.desc.includes(q)));
  });
  recount();
}

document.getElementById('srch').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  q ? doSearch(q) : showAll();
});

document.getElementById('filters').addEventListener('click', e => {
  const b = e.target.closest('.fbtn');
  if (b) filterCat(b.dataset.cat);
});

build();
</script>
</body>
</html>
